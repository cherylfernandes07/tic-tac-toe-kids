<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe | Kids Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&family=Fredoka:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --sky: #8fd6ff;
      --sun: #ffd84d;
      --mint: #6fd39c;
      --pink: #ff80bf;
      --orange: #ff9f4a;
      --grape: #5a4ed5;
      --card: #fff8eb;
      --ink: #2f365f;
      --white: #ffffff;
      --shadow: rgba(47, 54, 95, 0.2);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background-color: var(--sky);
      background-image:
        radial-gradient(circle at 12% 14%, rgba(255,255,255,0.72) 0 8%, transparent 9%),
        radial-gradient(circle at 84% 18%, rgba(255,255,255,0.62) 0 6%, transparent 7%),
        radial-gradient(circle at 20% 90%, rgba(255,216,77,0.3) 0 10%, transparent 11%),
        linear-gradient(180deg, var(--sky) 0%, #bcefff 45%, #fff3c3 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Baloo 2', cursive;
      padding: 24px 16px;
      color: var(--ink);
      overflow-x: hidden;
      position: relative;
      isolation: isolate;
    }

    body::before,
    body::after {
      content: '';
      position: fixed;
      inset: -10vh -10vw;
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
      background-repeat: repeat;
      background-size: 220px 220px;
      mix-blend-mode: soft-light;
    }

    body::before {
      background-image:
        radial-gradient(circle at 35px 30px, rgba(255,128,191,0.9) 0 8px, transparent 9px),
        radial-gradient(circle at 160px 70px, rgba(255,216,77,0.88) 0 7px, transparent 8px),
        radial-gradient(circle at 90px 150px, rgba(111,211,156,0.9) 0 9px, transparent 10px),
        radial-gradient(circle at 180px 185px, rgba(255,159,74,0.88) 0 6px, transparent 7px);
      animation: candyFloatA 24s linear infinite;
    }

    body::after {
      opacity: 0.3;
      background-size: 260px 260px;
      background-image:
        radial-gradient(circle at 45px 200px, rgba(90,78,213,0.7) 0 7px, transparent 8px),
        radial-gradient(circle at 130px 40px, rgba(255,255,255,0.95) 0 6px, transparent 7px),
        radial-gradient(circle at 210px 120px, rgba(255,128,191,0.75) 0 8px, transparent 9px);
      animation: candyFloatB 32s linear infinite;
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    @keyframes candyFloatA {
      0% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(-20px, -32px, 0); }
      100% { transform: translate3d(-40px, -64px, 0); }
    }

    @keyframes candyFloatB {
      0% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(22px, -24px, 0); }
      100% { transform: translate3d(44px, -48px, 0); }
    }

    /* ── Decorative border frame ── */
    .frame {
      position: relative;
      background: linear-gradient(155deg, #fff8ef, #fff2df);
      border: 4px solid var(--white);
      border-radius: 26px;
      padding: 30px 24px 24px;
      width: 100%;
      max-width: 420px;
      box-shadow:
        0 12px 0 var(--mint),
        0 22px 28px var(--shadow);
    }

    /* Corner stars */
    .frame::before, .frame::after {
      content: '★';
      position: absolute;
      font-size: 22px;
      color: #ffb84c;
      opacity: 1;
      line-height: 1;
    }
    .frame::before { top: 10px; left: 14px; }
    .frame::after  { top: 10px; right: 14px; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 10px; }

    .om {
      font-size: 24px;
      color: var(--pink);
      display: block;
      line-height: 1;
      margin-bottom: 6px;
      animation: bounce 2.8s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-4px); }
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: clamp(30px, 7vw, 40px);
      color: var(--grape);
      text-shadow: 0 3px 0 var(--white), 0 8px 18px rgba(90,78,213,0.25);
      letter-spacing: 0.5px;
      line-height: 1.05;
    }
    .subtitle {
      font-size: 12px;
      color: #5c7396;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-top: 2px;
      font-weight: 700;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0 14px;
      color: var(--orange);
      opacity: 1;
      font-size: 16px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(to right, #ffd36a, #ffa95d, #ffd36a);
    }

    /* ── Status bar ── */
    #status {
      text-align: center;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #3b5f86;
      min-height: 30px;
      margin-bottom: 14px;
      transition: color 0.3s;
    }
    #status .highlight { color: var(--grape); }

    /* ── Board ── */
    #board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .cell {
      aspect-ratio: 1;
      background: #ffffff;
      border: 3px solid #cce9ff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(32px, 9vw, 52px);
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: #f1fbff;
      border-color: #8ed3ff;
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 16px rgba(52,132,196,0.18);
    }
    .cell.taken { cursor: default; }
    .cell.win-cell {
      background: #fff6bb;
      border-color: var(--sun);
      animation: winGlow 0.5s ease forwards;
    }
    @keyframes winGlow {
      0%   { box-shadow: 0 0 0 rgba(255,216,77,0); }
      100% { box-shadow: 0 0 16px rgba(255,216,77,0.85); }
    }

    .cell-symbol {
      display: block;
      animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #eef8ff;
      border: 2px solid #cce9ff;
      border-radius: 14px;
      padding: 8px 14px;
      margin-bottom: 14px;
      font-size: 13px;
    }
    .score-item { text-align: center; }
    .score-label {
      display: block;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6482a8;
      margin-bottom: 1px;
      font-weight: 700;
    }
    .score-num {
      font-family: 'Fredoka', sans-serif;
      font-size: 24px;
      color: var(--grape);
      line-height: 1;
    }
    .score-divider { color: #9ecdf3; font-size: 18px; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 12px;
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.4px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      margin-top: 6px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--pink), var(--orange));
      color: #ffffff;
      box-shadow: 0 6px 0 #e56c9f;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 0 #e56c9f;
    }
    .btn-primary:active {
      transform: translateY(1px);
      box-shadow: 0 4px 0 #e56c9f;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      text-align: center;
      font-size: 12px;
      color: #3f6086;
      letter-spacing: 0.5px;
      font-weight: 700;
    }

    /* ── Overlay for winner ── */
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(66,99,138,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #overlay.show { display: flex; animation: fadeIn 0.35s ease; }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    .overlay-card {
      background: linear-gradient(155deg, #fff8ef, #ffeecf);
      border: 4px solid #ffffff;
      border-radius: 24px;
      padding: 28px 22px;
      text-align: center;
      box-shadow: 0 12px 0 var(--mint), 0 22px 26px var(--shadow);
      animation: floatIn 0.35s cubic-bezier(0.2,0.9,0.2,1) forwards;
      max-width: 320px;
      width: 90%;
    }
    @keyframes floatIn {
      from { transform: translateY(12px) scale(0.95); opacity: 0; }
      to   { transform: translateY(0) scale(1); opacity: 1; }
    }

    .overlay-icon { font-size: 52px; display: block; margin-bottom: 8px; }
    .overlay-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 30px;
      color: var(--grape);
      margin-bottom: 4px;
    }
    .overlay-msg {
      font-size: 16px;
      color: #4f6d91;
      margin-bottom: 12px;
      font-weight: 600;
    }
    #overlayFact {
      font-size: 12px;
      color: #4f6d91;
      background: #eef9ff;
      border: 2px solid #cde9ff;
      border-radius: 12px;
      padding: 8px 10px;
      margin-bottom: 14px;
      line-height: 1.45;
    }

    @media (max-width: 420px) {
      .frame { padding: 24px 18px 18px; }
      .score-num { font-size: 22px; }
      h1 { font-size: clamp(28px, 9vw, 36px); }
    }

    @media (prefers-reduced-motion: reduce) {
      body::before,
      body::after {
        animation: none;
      }
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="header">
    <span class="om">🐰</span>
    <h1>Tic Tac Toe</h1>
    <p class="subtitle">Fun for Kids</p>
  </div>

  <div class="divider">✦</div>

  <div class="score-bar">
    <div class="score-item">
      <span class="score-label">You 😀</span>
      <span class="score-num" id="scorePlayer">0</span>
    </div>
    <div class="score-divider">|</div>
    <div class="score-item">
      <span class="score-label">Draws</span>
      <span class="score-num" id="scoreDraw">0</span>
    </div>
    <div class="score-divider">|</div>
    <div class="score-item">
      <span class="score-label">CPU 🤖</span>
      <span class="score-num" id="scoreCPU">0</span>
    </div>
  </div>

  <div id="status">Your turn, superstar!</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button class="btn btn-primary" onclick="resetGame()">🔄 New Game</button>
</div>

<div class="footer">✦ Keep smiling and have fun ✦</div>

<!-- Win/Draw overlay -->
<div id="overlay">
  <div class="overlay-card">
    <span class="overlay-icon" id="overlayIcon"></span>
    <div class="overlay-title" id="overlayTitle"></div>
    <div class="overlay-msg" id="overlayMsg"></div>
    <div id="overlayFact"></div>
    <button class="btn btn-primary" onclick="closeOverlay()">Play Again 🎉</button>
  </div>
</div>
<script>
  const PLAYER = 'X', CPU = 'O';
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  // Symbols: player and CPU are shown with fun emoji markers.
  const SYM = { X: '😀', O: '🤖' };

  let board, gameActive, scores = { player: 0, draw: 0, cpu: 0 };

  function init() {
    board = Array(9).fill(null);
    gameActive = true;
    document.querySelectorAll('.cell').forEach(c => {
      c.innerHTML = '';
      c.classList.remove('taken', 'win-cell');
    });
    setStatus("Your turn, superstar!");
  }

  function setStatus(msg) {
    document.getElementById('status').innerHTML = msg;
  }

  function checkWinner(b) {
    for (const [a, x, c] of WINS) {
      if (b[a] && b[a] === b[x] && b[a] === b[c]) return { winner: b[a], line: [a, x, c] };
    }
    if (b.every(v => v)) return { winner: 'draw' };
    return null;
  }

  function highlightWin(line) {
    line.forEach(i => document.querySelector(`.cell[data-i="${i}"]`).classList.add('win-cell'));
  }

  function handleResult(result) {
    gameActive = false;
    if (result.winner === 'draw') {
      scores.draw++;
      showOverlay('🤝', 'It\'s a Draw!', 'Great game! Want a rematch?', 'draw');
    } else if (result.winner === PLAYER) {
      scores.player++;
      highlightWin(result.line);
      showOverlay('🏆', 'You Win!', 'Awesome! You beat the computer!', 'win');
    } else {
      scores.cpu++;
      highlightWin(result.line);
      showOverlay('🤖', 'Computer Wins!', 'Nice try! You will get it next round!', 'loss');
    }
    updateScores();
  }

  function updateScores() {
    document.getElementById('scorePlayer').textContent = scores.player;
    document.getElementById('scoreDraw').textContent   = scores.draw;
    document.getElementById('scoreCPU').textContent    = scores.cpu;
  }

  // ── Kid-friendly AI ──
  // The CPU is a bit sleepy! It will:
  //   1. Always take a winning move if it has one (so it's not totally silly)
  //   2. Only block the player ~35% of the time (often lets kids win!)
  //   3. Otherwise pick a random empty cell

  function getEmpty(b) {
    return b.reduce((acc, v, i) => { if (!v) acc.push(i); return acc; }, []);
  }

  function findWinningMove(b, mark) {
    for (const [a, x, c] of WINS) {
      const line = [b[a], b[x], b[c]];
      const cells = [a, x, c];
      const marks = line.filter(v => v === mark).length;
      const empty = line.filter(v => !v).length;
      if (marks === 2 && empty === 1) {
        return cells[line.indexOf(null)];
      }
    }
    return -1;
  }

  function cpuPlay() {
    if (!gameActive) return;
    setStatus('🤖 CPU is thinking...');
    setTimeout(() => {
      const empty = getEmpty(board);
      if (!empty.length) return;

      let move = -1;

      // 1. Take a win if available (always)
      move = findWinningMove(board, CPU);

      // 2. Block player only 35% of the time — lets kids win more often!
      if (move === -1 && Math.random() < 0.35) {
        move = findWinningMove(board, PLAYER);
      }

      // 3. Otherwise pick a random empty cell
      if (move === -1) {
        move = empty[Math.floor(Math.random() * empty.length)];
      }

      board[move] = CPU;
      const cell = document.querySelector(`.cell[data-i="${move}"]`);
      cell.innerHTML = `<span class="cell-symbol">${SYM[CPU]}</span>`;
      cell.classList.add('taken');
      const result = checkWinner(board);
      if (result) { handleResult(result); return; }
      setStatus("Your turn, superstar!");
    }, 420);
  }

  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (!gameActive || board[i]) return;
      board[i] = PLAYER;
      cell.innerHTML = `<span class="cell-symbol">${SYM[PLAYER]}</span>`;
      cell.classList.add('taken');
      const result = checkWinner(board);
      if (result) { handleResult(result); return; }
      cpuPlay();
    });
  });

  const KID_JOKES = [
    "Why did the cookie go to the doctor? Because it felt crumbly.",
    "What kind of tree fits in your hand? A palm tree.",
    "Why was the math book happy? It had lots of fun problems.",
    "What do you call a sleeping bull? A bulldozer.",
    "Why did the banana wear sunscreen? It did not want to peel.",
    "What do you get when you cross a fish and an elephant? Swimming trunks.",
    "Why did the teddy bear skip dessert? It was already stuffed.",
    "What did one wall say to the other wall? I will meet you at the corner.",
    "Why are ghosts bad at lying? You can see right through them.",
    "What did the pencil say to the paper? You have got a point.",
  ];

  function showOverlay(icon, title, msg) {
    document.getElementById('overlayIcon').textContent  = icon;
    document.getElementById('overlayTitle').textContent = title;
    document.getElementById('overlayMsg').textContent   = msg;
    const fact = KID_JOKES[Math.floor(Math.random() * KID_JOKES.length)];
    document.getElementById('overlayFact').textContent  = fact;
    document.getElementById('overlay').classList.add('show');
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    init();
  }

  function resetGame() { closeOverlay(); init(); }

  init();
</script>
</body>
</html>
